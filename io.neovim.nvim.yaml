app-id: io.neovim.nvim

runtime: org.freedesktop.Sdk
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

command: nvim-wrapper
rename-desktop-file: nvim.desktop
rename-appdata-file: nvim.appdata.xml
rename-icon: nvim

finish-args:
  # Edit anything
  - --filesystem=host
  - --filesystem=/tmp
  - --filesystem=/var/tmp
  # Plugin updates
  - --share=network
  # Clipboard access
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc

add-extensions:
  io.neovim.nvim.tool:
    directory: tools
    subdirectories: true
    add-ld-path: lib
    no-autodownload: true

modules:
  # deps from https://github.com/neovim/neovim/blob/v0.11.2/cmake.deps/deps.txt
  # lua deps
  - name: LuaJIT
    no-autogen: true
    make-args:
      - PREFIX=/app
    make-install-args:
      - PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/luajit/luajit/archive/fdf2379ccba1eb68ff07f8bc48541568f5bbdfbf.tar.gz
        sha256: 4f3fcc8a9a685ec2c449824b26d7c5f4b9c7faff851915cf13e68fb740c25048
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
      - '*.a'

  - name: lpeg
    no-autogen: true
    no-make-install: true
    make-args:
      - LUADIR=/app/include/luajit-2.1/
    post-install:
      - install -Dm755 -t /app/lib/lua/5.1/ lpeg.so
      - install -Dm644 -t /app/share/lua/5.1/ re.lua
    sources:
      - type: archive
        url: https://github.com/neovim/deps/raw/d495ee6f79e7962a53ad79670cb92488abe0b9b4/opt/lpeg-1.1.0.tar.gz
        sha256: 4b155d67d2246c1ffa7ad7bc466c1ea899bbc40fef0257cc9c03cecbaed4352a

  - name: mpack-lua
    no-autogen: true
    make-args:
      - USE_SYSTEM_MPACK=yes
      - LUA_INCLUDE=-I/app/include/luajit-2.1/
    make-install-args:
      - USE_SYSTEM_MPACK=yes
    sources:
      - type: archive
        url: https://github.com/libmpack/libmpack-lua/archive/1.0.13.tar.gz
        sha256: 436a6a3973207403d3f20082002c32e74c25d9149ff2516dc06b0b41514044bf
      - type: shell
        commands:
          - sed -i 's|/usr/lib|/app/lib|' ./Makefile
    cleanup:
      - '*'
    modules:
      - name: mpack
        no-autogen: true
        make-install-args:
          - PREFIX=/app
        sources:
          - type: archive
            url: https://github.com/libmpack/libmpack/archive/1.0.5.tar.gz
            sha256: 4ce91395d81ccea97d3ad4cb962f8540d166e59d3e2ddce8a22979b49f108956
        cleanup:
          - '*'

  - name: luv
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_MODULE=OFF
      - -DBUILD_SHARED_LIBS=ON
      - -DWITH_SHARED_LIBUV=ON
      - -DLUA_BUILD_TYPE=System
    sources:
      - type: archive
        url: https://github.com/luvit/luv/releases/download/1.52.1-0/luv-1.52.1-0.tar.gz
        sha256: 3e6eb820a3aee034f85f9cce9bd77b5d42f34d128a1ccec877adf28c913577c7
        x-checker-data:
          type: anitya
          project-id: 21510
          url-template: https://github.com/luvit/luv/releases/download/$version/luv-$version.tar.gz
    modules:
      - name: libuv
        sources:
          - type: archive
            url: https://github.com/libuv/libuv/archive/v1.52.1.tar.gz
            sha256: 478baf2599bfbc882c355288c9cb6f92e0e7dda435fa04031fa5b607cf3f414c
            x-checker-data:
              type: anitya
              project-id: 10784
              url-template: https://github.com/libuv/libuv/archive/v$version.tar.gz

  # lua deps end
  - name: msgpack-c
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/msgpack/msgpack-c/releases/download/c-6.1.0/msgpack-c-6.1.0.tar.gz
        sha256: 674119f1a85b5f2ecc4c7d5c2859edf50c0b05e0c10aa0df85eefa2c8c14b796
    cleanup:
      - /include
      - /lib/cmake
      - /lib/pkgconfig
      - '*.a'

  - name: unibilium
    no-autogen: true
    make-install-args:
      - PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/neovim/unibilium/archive/v2.1.1.tar.gz
        sha256: 6f0ee21c8605340cfbb458cbd195b4d074e6d16dd0c0e12f2627ca773f3cabf1

  - name: libvterm
    no-autogen: true
    make-install-args:
      - PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/neovim/libvterm/archive/0a15c6e983b0db7ef8276e0792414a805d01bdaf.tar.gz
        sha256: c4683e7a2d71c04781fd0ab7719a94202800e97a9e091514c16983bb732b0fa7
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - '*.a'
      - '*.la'

  - name: libtermkey
    no-autogen: true
    make-install-args:
      - PREFIX=/app
    sources:
      - type: archive
        url: http://www.leonerd.org.uk/code/libtermkey/libtermkey-0.22.tar.gz
        sha256: 6945bd3c4aaa83da83d80a045c5563da4edd7d0374c62c0d35aec09eb3014600
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/man
      - '*.la'

  - name: wl-clipboard
    buildsystem: meson
    config-opts:
      - -Dzshcompletiondir=no
      - -Dfishcompletiondir=no
    sources:
      - type: archive
        url: https://github.com/bugaevc/wl-clipboard/archive/v2.3.0.tar.gz
        sha256: b4dc560973f0cd74e02f817ffa2fd44ba645a4f1ea94b7b9614dacc9f895f402
        x-checker-data:
          type: anitya
          project-id: 49082
          url-template: https://github.com/bugaevc/wl-clipboard/archive/v$version.tar.gz

    cleanup:
      - /share/man

  - name: xclip
    sources:
      - type: archive
        url: https://github.com/astrand/xclip/archive/0.13.tar.gz
        sha256: ca5b8804e3c910a66423a882d79bf3c9450b875ac8528791fb60ec9de667f758
    cleanup:
      - /share/man
      - /bin/xclip-*file
    modules:
      - name: libXmu
        config-opts:
          - --disable-static
          - --disable-docs
        sources:
          - type: archive
            url: https://www.x.org/releases/individual/lib/libXmu-1.1.3.tar.bz2
            sha256: 9c343225e7c3dc0904f2122b562278da5fed639b1b5e880d25111561bac5b731
        cleanup:
          - /include
          - /lib/pkgconfig
          - '*.la'

  - python3-pynvim.yaml

  - name: tree-sitter
    no-autogen: true
    make-install-args:
      - PREFIX=/app
    sources:
      - type: archive
        url: https://github.com/tree-sitter/tree-sitter/archive/v0.26.8.tar.gz
        sha256: e6826b7533ec3a885aba598377a6d20b5a6321ff3db76968e960c2352d3a5077
        x-checker-data:
          type: anitya
          project-id: 142464
          url-template: https://github.com/tree-sitter/tree-sitter/archive/v$version.tar.gz

    cleanup:
      - /lib/pkgconfig

  - name: utf8proc
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=OFF
      - -DUTF8PROC_INSTALL=ON
      - -DUTF8PROC_ENABLE_TESTING=OFF
    builddir: true
    sources:
      - type: git
        url: https://github.com/JuliaStrings/utf8proc.git
        tag: v2.11.3
        commit: e5e799221b45bbb90f5fdc5c69b6b8dfbf017e78
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  # Tree-sitter parsers bundled
  - name: tree-sitter-bash
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/nvim/parser
      - cc -shared -fPIC src/parser.c -I src -o /app/lib/nvim/parser/bash.so
    sources:
      - type: archive
        url: https://github.com/tree-sitter/tree-sitter-bash/archive/v0.25.0.tar.gz
        sha256: 9d6bad618e712b51ff060515b0ce6872e33727148f35becb8aa3ad80044c2348

  - name: tree-sitter-c
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/nvim/parser
      - cc -shared -fPIC src/parser.c -I src -o /app/lib/nvim/parser/c.so
    sources:
      - type: archive
        url: https://github.com/tree-sitter/tree-sitter-c/archive/v0.24.1.tar.gz
        sha256: 25dd4bb3dec770769a407e0fc803f424ce02c494a56ce95fedc525316dcf9b48

  - name: tree-sitter-lua
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/nvim/parser
      - cc -shared -fPIC src/parser.c src/scanner.c -I src -o /app/lib/nvim/parser/lua.so
    sources:
      - type: archive
        url: https://github.com/tree-sitter-grammars/tree-sitter-lua/archive/v0.4.0.tar.gz
        sha256: b0977aced4a63bb75f26725787e047b8f5f4a092712c840ea7070765d4049559

  - name: tree-sitter-markdown
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/nvim/parser
      - cc -shared -fPIC tree-sitter-markdown/src/parser.c tree-sitter-markdown/src/scanner.c
        -I tree-sitter-markdown/src -o /app/lib/nvim/parser/markdown.so
      - cc -shared -fPIC tree-sitter-markdown-inline/src/parser.c tree-sitter-markdown-inline/src/scanner.c
        -I tree-sitter-markdown-inline/src -o /app/lib/nvim/parser/markdown_inline.so
    sources:
      - type: archive
        url: https://github.com/tree-sitter-grammars/tree-sitter-markdown/archive/v0.5.1.tar.gz
        sha256: acaffe5a54b4890f1a082ad6b309b600b792e93fc6ee2903d022257d5b15e216

  - name: tree-sitter-python
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/nvim/parser
      - cc -shared -fPIC src/parser.c src/scanner.c -I src -o /app/lib/nvim/parser/python.so
    sources:
      - type: archive
        url: https://github.com/tree-sitter/tree-sitter-python/archive/v0.25.0.tar.gz
        sha256: 4609a3665a620e117acf795ff01b9e965880f81745f287a16336f4ca86cf270c

  - name: tree-sitter-query
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/nvim/parser
      - cc -shared -fPIC src/parser.c -I src -o /app/lib/nvim/parser/query.so
    sources:
      - type: archive
        url: https://github.com/nvim-treesitter/tree-sitter-query/archive/v0.7.0.tar.gz
        sha256: 79285847e8350ee9fe1f6f6c9eb64bc14320f70f7b9b65037193fc58f2638613

  - name: tree-sitter-vim
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/nvim/parser
      - cc -shared -fPIC src/parser.c src/scanner.c -I src -o /app/lib/nvim/parser/vim.so
    sources:
      - type: archive
        url: https://github.com/tree-sitter-grammars/tree-sitter-vim/archive/v0.7.0.tar.gz
        sha256: 44eabc31127c4feacda19f2a05a5788272128ff561ce01093a8b7a53aadcc7b2

  - name: tree-sitter-vimdoc
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/nvim/parser
      - cc -shared -fPIC src/parser.c -I src -o /app/lib/nvim/parser/vimdoc.so
    sources:
      - type: archive
        url: https://github.com/neovim/tree-sitter-vimdoc/archive/v4.0.0.tar.gz
        sha256: 8096794c0f090b2d74b7bff94548ac1be3285b929ec74f839bd9b3ff4f4c6a0b

  - name: neovim
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      # - -DUSE_BUNDLED=OFF
    post-install:
      # Install/fix AppData
      # - sed -i "s|<id>nvim</id>|<id>$FLATPAK_ID</id>|" ../runtime/nvim.appdata.xml
      - sed -i "/<id>$FLATPAK_ID<\/id>/a \ \ <developer_name translatable=\"no\">Neovim
        contributors<\/developer_name>" ../runtime/nvim.appdata.xml
      - sed -i "/<developer_name/a \ \ <url type=\"vcs-browser\">https://github.com/neovim/neovim</url>"
        ../runtime/nvim.appdata.xml
      - install -Dm644 ../runtime/nvim.appdata.xml -t /app/share/metainfo
      # Install icon
      - install -Dm644 ../neovim-mark.svg /app/share/icons/hicolor/scalable/apps/nvim.svg
      # Set desktop
      - desktop-file-edit --set-key=Exec --set-value="nvim-wrapper %F" /app/share/applications/nvim.desktop
      # Create directory for tool
      - install -d "${FLATPAK_DEST}/tools"
    sources:
      - type: archive
        url: https://github.com/neovim/neovim/archive/v0.12.1.tar.gz
        sha256: 41898a5073631bc8fd9ac43476b811c05fb3b88ffb043d4fbb9e75e478457336
        x-checker-data:
          is-main-source: true
          type: anitya
          project-id: 9037
          url-template: https://github.com/neovim/neovim/archive/v$version.tar.gz
      - type: file
        path: neovim-mark.svg

  - name: ide-flatpak-wrapper
    buildsystem: meson
    sources:
      - type: git
        commit: d581fd9b873acbf6fb22899aa388435f6c00f61a
        url: https://github.com/flathub/ide-flatpak-wrapper
      - type: file
        path: neovim-first-run.txt
      - type: file
        path: neovim-sdk-update.txt
    config-opts:
      - -Deditor_binary=/app/bin/nvim
      - -Dprogram_name=nvim-wrapper
      - -Deditor_title=Neovim
      - -Dfirst_run_template=neovim-first-run.txt
      - -Dsdk_update_template=neovim-sdk-update.txt
      - -Dflagfile_prefix=flatpak-neovim
      - -Ddefault_loglevel=0
